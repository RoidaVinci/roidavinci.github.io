<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' https://cdn.jsdelivr.net; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'">
<meta name="referrer" content="strict-origin-when-cross-origin">
<meta name="color-scheme" content="light dark">

{%- seo -%}

<link rel="icon" type="image/x-icon" href="{{ '/favicon.ico' | relative_url }}">
<link rel="icon" type="image/png" href="{{ '/favicon.png' | relative_url }}">

<link rel="stylesheet" href="{{ '/assets/fonts/cmun-serif/cmun-serif.css' | relative_url }}">
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

{%- comment -%} Applies the saved theme before first paint to avoid a flash. {%- endcomment -%}
<script src="{{ '/assets/js/theme.js' | relative_url }}"></script>

{%- if page.math %}
<script src="{{ '/assets/js/mathjax-config.js' | relative_url }}"></script>
<script id="MathJax-script" async
        src="https://cdn.jsdelivr.net/npm/mathjax@3.2.2/es5/tex-mml-chtml.js"
        crossorigin="anonymous"></script>
{%- endif %}
