---
layout: default
---
<article class="article prose">
  <header class="article-header">
    <a class="back-link" href="{{ '/articles/' | relative_url }}">
      <svg class="icon" aria-hidden="true"><use href="#icon-arrow-left"></use></svg>
      All articles
    </a>
    <h1 class="page-title">{{ page.title }}</h1>
    {%- if page.description %}
    <p class="article-lead">{{ page.description }}</p>
    {%- endif %}
    {%- if page.tags and page.tags != empty %}
    <ul class="card-tags article-tags" aria-label="Topics">
      {%- for tag in page.tags %}<li>{{ tag }}</li>{% endfor %}
    </ul>
    {%- endif %}
  </header>

  {{ content }}

  <footer class="article-footer">
    <a class="back-link" href="{{ '/articles/' | relative_url }}">
      <svg class="icon" aria-hidden="true"><use href="#icon-arrow-left"></use></svg>
      Back to all articles
    </a>
  </footer>
</article>
